name: GitHub Snake Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%2300E5FF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2300E5FF
            dist/github-snake.gif?palette=github-dark&color_snake=%2300E5FF

      - name: Convert green theme to red
        run: |
          for file in dist/*.svg; do
            echo "Editing $file"

            # Background
            sed -i 's/#161b22/#0d1117/gI' "$file"

            # GitHub contribution colors
            sed -i 's/#0e4429/#200000/gI' "$file"
            sed -i 's/#006d32/#660000/gI' "$file"
            sed -i 's/#26a641/#bb0000/gI' "$file"
            sed -i 's/#39d353/#ff3030/gI' "$file"

            # Older GitHub palette
            sed -i 's/#216e39/#bb0000/gI' "$file"
            sed -i 's/#30a14e/#ff3030/gI' "$file"

            # Common green shades used for the progress bar
            sed -i 's/#22c55e/#ff3030/gI' "$file"
            sed -i 's/#00c647/#ff3030/gI' "$file"
            sed -i 's/#00d646/#ff3030/gI' "$file"
            sed -i 's/#00e000/#ff3030/gI' "$file"
            sed -i 's/#00ff00/#ff3030/gI' "$file"
          done

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
