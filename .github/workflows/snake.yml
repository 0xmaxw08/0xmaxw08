name: GitHub Snake Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%23C77DFF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23C77DFF
            dist/github-snake.gif?palette=github-dark&color_snake=%23C77DFF

      - name: Copy generated files
        run: |
          mkdir -p output
          cp -r dist/* output/

      - name: Apply custom dark theme
        run: |
          file="output/github-snake-dark.svg"

          # Background
          perl -pi -e 's/#161b22/#0d1117/ig' "$file"

          # Empty contribution cells -> Soft gray
          perl -pi -e 's/#1b1f23/#374151/ig' "$file"
          perl -pi -e 's/#161b22/#374151/ig' "$file"

          # Red contribution palette
          perl -pi -e 's/#01311f/#220000/ig' "$file"
          perl -pi -e 's/#034525/#660000/ig' "$file"
          perl -pi -e 's/#0f6d31/#bb0000/ig' "$file"
          perl -pi -e 's/#00c647/#ff3030/ig' "$file"

      - name: Publish
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: output
