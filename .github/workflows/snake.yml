name: GitHub Snake Game

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate GitHub Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%2300E5FF&color_dots=%23f0f0f0,%23ffcccc,%23ff6666,%23ff3333,%23ff0000
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2300E5FF&color_dots=%230d0000,%23330000,%23660000,%23cc0000,%23ff0000
            dist/github-snake.gif?palette=github-dark&color_snake=%2300E5FF&color_dots=%230d0000,%23330000,%23660000,%23cc0000,%23ff0000

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"
