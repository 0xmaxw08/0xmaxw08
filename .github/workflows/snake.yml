name: GitHub Snake Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%2339FF14
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2339FF14
            dist/github-snake.gif?palette=github-dark&color_snake=%2339FF14

      - name: Make contribution colors red
        run: |
          for file in dist/*.svg; do
            sed \
              -e 's/#0e4429/#1a0000/g' \
              -e 's/#006d32/#550000/g' \
              -e 's/#26a641/#aa0000/g' \
              -e 's/#39d353/#ff0000/g' \
              -e 's/#216e39/#aa0000/g' \
              -e 's/#30a14e/#ff0000/g' \
              "$file" > "$file.tmp"

            mv "$file.tmp" "$file"
          done

      - name: Publish
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
