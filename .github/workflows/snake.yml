name: GitHub Snake Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%23C77DFF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23C77DFF
            dist/ocean.gif?color_snake=%23C77DFF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy generated files
        run: |
          mkdir -p output
          cp -r dist/* output/

      - name: Convert green contributions to red
        run: |
          for file in output/*.svg; do

            # ---------- Light Theme ----------
            perl -pi -e 's/#9be9a8/#ffb3b3/ig' "$file"
            perl -pi -e 's/#40c463/#ff6b6b/ig' "$file"
            perl -pi -e 's/#30a14e/#ff3030/ig' "$file"
            perl -pi -e 's/#216e39/#b30000/ig' "$file"

            # ---------- Dark Theme ----------
            perl -pi -e 's/#01311f/#220000/ig' "$file"
            perl -pi -e 's/#034525/#660000/ig' "$file"
            perl -pi -e 's/#0f6d31/#bb0000/ig' "$file"
            perl -pi -e 's/#00c647/#ff3030/ig' "$file"

            # ---------- Older GitHub palettes ----------
            perl -pi -e 's/#0e4429/#220000/ig' "$file"
            perl -pi -e 's/#006d32/#660000/ig' "$file"
            perl -pi -e 's/#26a641/#bb0000/ig' "$file"
            perl -pi -e 's/#39d353/#ff3030/ig' "$file"

          done

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: output
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"
